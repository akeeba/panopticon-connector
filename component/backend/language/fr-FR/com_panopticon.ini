COM_PANOPTICON_CONFIG_SYSINFO_DESC="Collectez et signalez des informations systeme telles que l'utilisation du processeur, l'utilisation du disque, etc. Cela est utile pour depanner les problemes de performance du serveur, mais certains hebergeurs pretendent que vous n'etes pas autorise a les collecter et peuvent vous compliquer la tache. Dans ce cas, desactivez cette fonctionnalite jusqu'a ce que vous deplaciez votre site vers un hebergeur correct."
