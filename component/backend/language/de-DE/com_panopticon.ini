COM_PANOPTICON="Akeeba Panopticon Connector"
COM_PANOPTICON_XML_DESCRIPTION="Mit dieser Komponente kann Ihre Site von einer Akeeba Panopticon-Instanz verwaltet werden."

COM_PANOPTICON_WELCOME_TITLE="Akeeba Panopticon Connector"
COM_PANOPTICON_WELCOME_CONTENT="Diese Komponente ermöglicht die Fernverwaltung Ihrer Site durch eine Akeeba Panopticon-Instanz."

COM_PANOPTICON_WELCOME_ERR_NOTOKEN_TITLE="Sie haben keinen Joomla!-API-Token erstellt."
COM_PANOPTICON_WELCOME_ERR_NOTOKEN_DETAILS="Sie müssen Ihr Kontoprofil bearbeiten, zur Registerkarte Joomla-API-Token gehen, Aktiv auf Ja setzen und dann auf Speichern und schließen klicken."
COM_PANOPTICON_WELCOME_ERR_NOTOKEN_ACTION="Konto bearbeiten"

COM_PANOPTICON_WELCOME_ERR_NO_AUTH_PLG_TITLE="Das Plugin „API-Authentifizierung – Web Services Joomla Token“ ist nicht aktiviert"
COM_PANOPTICON_WELCOME_ERR_NO_AUTH_PLG_DETAILS="Sie müssen das Plugin „API-Authentifizierung – Web Services Joomla Token“ aktivieren, um Ihre Site mit einer Akeeba Panopticon-Instanz zu verbinden."

COM_PANOPTICON_WELCOME_ERR_NO_USER_PLG_TITLE="Das Plugin „Benutzer – Joomla-API-Token“ ist nicht aktiviert"
COM_PANOPTICON_WELCOME_ERR_NO_USER_PLG_DETAILS="Sie müssen das Plugin „Benutzer – Joomla API Token“ aktivieren, um Ihre Site mit einer Akeeba Panopticon-Instanz zu verbinden."

COM_PANOPTICON_WELCOME_ERR_NO_WEBSERVICES_PLG_TITLE="Das Plugin „Web Services – Panopticon“ ist nicht aktiviert"
COM_PANOPTICON_WELCOME_ERR_NO_WEBSERVICES_PLG_DETAILS="Sie müssen das Plugin „Web Services – Panopticon“ aktivieren, um Ihre Site mit einer Akeeba Panopticon-Instanz zu verbinden."

COM_PANOPTICON_WELCOME_ERR_NO_WEBSERVICESINSTALLER_PLG_TITLE="Das Plugin „Web Services – Installer“ ist nicht aktiviert"
COM_PANOPTICON_WELCOME_ERR_NO_WEBSERVICESINSTALLER_PLG_DETAILS="Sie müssen das Plugin „Web Services – Installer“ aktivieren, um Ihre Site mit einer Akeeba Panopticon-Instanz zu verbinden."

COM_PANOPTICON_WELCOME_ERR_COMMON_ACTION="Plugin anzeigen"

COM_PANOPTICON_WELCOME_INFO_HEAD="Verbindungsinformationen"
COM_PANOPTICON_WELCOME_INFO_DETAILS="Verwenden Sie die folgenden Informationen, um Ihre Site mit einer Akeeba Panopticon-Instanz zu verbinden."
COM_PANOPTICON_WELCOME_INFO_ENDPOINT="Endpunkt"
COM_PANOPTICON_WELCOME_INFO_API_TOKEN="API-Token"

COM_PANOPTICON_CONFIG_PREFS_LABEL="Einstellungen"
COM_PANOPTICON_CONFIG_SYSINFO_LABEL="Systeminformationen melden"
COM_PANOPTICON_CONFIG_SYSINFO_DESC="Sammeln und melden Sie Systeminformationen wie CPU-Auslastung, Festplattennutzung usw. Dies ist hilfreich bei der Fehlersuche zu Leistungsproblemen des Servers, aber manche Hosts tun so, als dürften Sie diese Informationen nicht erfassen, und machen Ihnen deswegen womöglich Probleme. Deaktivieren Sie diese Funktion in diesem Fall, bis Sie Ihre Site zu einem vernuenftigen Host umziehen."
COM_PANOPTICON_CONFIG_ALLOW_REMOTE_INSTALL_LABEL="Remote-Installation von Erweiterungen erlauben"
COM_PANOPTICON_CONFIG_ALLOW_REMOTE_INSTALL_DESC="Erlauben Sie Akeeba Panopticon, Erweiterungen auf dieser Site aus der Ferne zu installieren. Deaktivieren Sie dies, wenn Sie aus Sicherheitsgruenden keine Remote-Installation von Erweiterungen zulassen moechten."
