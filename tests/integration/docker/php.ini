; Test-tuned PHP settings for the Panopticon Connector integration harness.
; Opposite of a production ini: errors visible, generous limits.
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On

memory_limit = 512M
max_execution_time = 0

; Joomla writes/serialises a fair amount during install and updates.
date.timezone = UTC
phar.readonly = Off
